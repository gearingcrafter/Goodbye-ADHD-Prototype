<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye ADHD | Solutions for your day's problems</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="user-info">
                <h1>Goodbye ADHD</h1>
                <span class="identity-badge"><i class="fas fa-graduation-cap"></i> Academic Profile</span>
            </div>
            <i class="fas fa-user-circle profile-icon"></i>
        </header>

        <main class="app-content">
            
            <section class="card focus-section">
                <h2>Current Sprint</h2>
                <div class="progress-ring-container">
                    <div class="progress-ring">
                        <span class="time-left">14:59</span>
                    </div>
                </div>
                <p class="scaffolding-text">Visual Scaffolding Active</p>
            </section>

            <section class="card habit-section">
                <h2>Micro-Milestones</h2>
                <ul class="milestone-list">
                    <li class="milestone completed">
                        <i class="fas fa-check-circle"></i>
                        <span>Open Textbook</span>
                    </li>
                    <li class="milestone pending">
                        <i class="far fa-circle"></i>
                        <span>Write 1 Sentence</span>
                    </li>
                    <li class="milestone pending">
                        <i class="far fa-circle"></i>
                        <span>Set Focus Timer</span>
                    </li>
                </ul>
            </section>

        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="#" class="nav-item"><i class="fas fa-stopwatch"></i><span>Focus</span></a>
            <a href="#" class="nav-item"><i class="fas fa-list-check"></i><span>Habits</span></a>
            <a href="#" class="nav-item"><i class="fas fa-chart-line"></i><span>Mood</span></a>
        </nav>

    </div>

</body>
</html>
